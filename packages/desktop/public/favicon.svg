<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D87A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#1A1A1E"/>

  <!-- Sunrise rays (radiating from center, y=580) -->
  <g stroke="url(#gold-grad)" stroke-linecap="round" opacity="0.9">
    <!-- Far left rays -->
    <line x1="512" y1="580" x2="200" y2="310" stroke-width="14"/>
    <line x1="512" y1="580" x2="240" y2="270" stroke-width="12"/>
    <!-- Left rays -->
    <line x1="512" y1="580" x2="295" y2="240" stroke-width="12"/>
    <line x1="512" y1="580" x2="355" y2="215" stroke-width="12"/>
    <line x1="512" y1="580" x2="420" y2="200" stroke-width="12"/>
    <!-- Center rays -->
    <line x1="512" y1="580" x2="470" y2="195" stroke-width="13"/>
    <line x1="512" y1="580" x2="512" y2="192" stroke-width="14"/>
    <line x1="512" y1="580" x2="554" y2="195" stroke-width="13"/>
    <!-- Right rays -->
    <line x1="512" y1="580" x2="604" y2="200" stroke-width="12"/>
    <line x1="512" y1="580" x2="669" y2="215" stroke-width="12"/>
    <line x1="512" y1="580" x2="729" y2="240" stroke-width="12"/>
    <!-- Far right rays -->
    <line x1="512" y1="580" x2="784" y2="270" stroke-width="12"/>
    <line x1="512" y1="580" x2="824" y2="310" stroke-width="14"/>
  </g>

  <!-- Sun semicircle -->
  <path d="M 230 580 A 282 282 0 0 1 794 580 Z" fill="url(#gold-grad)" opacity="0.95"/>

  <!-- Book pages fan (dark lines over sun) -->
  <g stroke="#1A1A1E" stroke-linecap="round" stroke-width="9" opacity="0.7">
    <line x1="512" y1="580" x2="370" y2="400"/>
    <line x1="512" y1="580" x2="390" y2="385"/>
    <line x1="512" y1="580" x2="415" y2="373"/>
    <line x1="512" y1="580" x2="442" y2="365"/>
    <line x1="512" y1="580" x2="470" y2="361"/>
    <line x1="512" y1="580" x2="512" y2="360"/>
    <line x1="512" y1="580" x2="554" y2="361"/>
    <line x1="512" y1="580" x2="582" y2="365"/>
    <line x1="512" y1="580" x2="609" y2="373"/>
    <line x1="512" y1="580" x2="634" y2="385"/>
    <line x1="512" y1="580" x2="654" y2="400"/>
  </g>

  <!-- Open book body -->
  <!-- Left page -->
  <path d="M 512 580 L 310 520 L 295 760 L 512 800 Z" fill="url(#gold-grad)"/>
  <!-- Right page -->
  <path d="M 512 580 L 714 520 L 729 760 L 512 800 Z" fill="url(#gold-grad)"/>
  <!-- Book spine shadow -->
  <line x1="512" y1="580" x2="512" y2="800" stroke="#1A1A1E" stroke-width="10" opacity="0.5"/>

  <!-- Left page: 明 character -->
  <text x="400" y="730" font-family="STHeiti, Heiti TC, serif" font-size="140" font-weight="bold"
        fill="#1A1A1E" text-anchor="middle" opacity="0.85">明</text>

  <!-- Right page: 開 character -->
  <text x="624" y="730" font-family="STHeiti, Heiti TC, serif" font-size="140" font-weight="bold"
        fill="#1A1A1E" text-anchor="middle" opacity="0.85">開</text>
</svg>
