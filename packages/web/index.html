    <title>TomeKeep</title>
    <script>
      ;(function(){
        var t = localStorage.getItem('theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (t === 'dark' || (t !== 'light' && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
