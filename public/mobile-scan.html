<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>TomeKeep 扫码</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.15);
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px env(safe-area-inset-bottom, 16px);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0 18px;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 18px; flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    /* ── Status badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .badge.scanning  { background: var(--green-dim); color: var(--green); }
    .badge.scanning .badge-dot { background: var(--green); animation: pulse 1.2s infinite; }
    .badge.idle      { background: rgba(148,163,184,.12); color: var(--text-muted); }
    .badge.idle .badge-dot { background: var(--text-muted); }
    .badge.error     { background: rgba(239,68,68,.12); color: var(--red); }
    .badge.error .badge-dot { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(.8); }
    }

    /* ── Camera area ── */
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin: 12px 0;
      border: 1px solid var(--border);
    }
    .camera-wrap video,
    .camera-wrap canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .camera-wrap canvas { pointer-events: none; }

    /* Viewfinder corners */
    .viewfinder {
      position: absolute; inset: 0; pointer-events: none;
    }
    .vf-corner {
      position: absolute; width: 22px; height: 22px;
      border-color: rgba(255,255,255,.55); border-style: solid;
    }
    .vf-corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-top-left-radius: 4px; }
    .vf-corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; border-top-right-radius: 4px; }
    .vf-corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; border-bottom-left-radius: 4px; }
    .vf-corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-bottom-right-radius: 4px; }

    /* Camera placeholder / error overlay */
    .cam-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 20px; text-align: center; background: rgba(0,0,0,.7);
    }
    .cam-overlay svg { opacity: .5; }
    .cam-overlay p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .cam-overlay.hidden { display: none; }

    /* ── Status message ── */
    .status-msg {
      font-size: 13px; color: var(--text-muted);
      text-align: center; padding: 4px 0 8px; min-height: 24px;
    }

    /* ── Scanned list ── */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0 8px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .list-count {
      background: var(--surface); color: var(--text-muted);
      font-size: 11px; padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border);
    }

    .scan-list {
      flex: 1;
      list-style: none;
      display: flex; flex-direction: column; gap: 8px;
    }

    .scan-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 14px;
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }
    .item-icon.ok       { background: var(--green-dim); color: var(--green); }
    .item-icon.no-meta  { background: rgba(234,179,8,.12); color: var(--yellow); }
    .item-icon.pending  { background: rgba(148,163,184,.1); color: var(--text-muted); }
    .item-icon.sending  { background: rgba(59,130,246,.12); color: var(--blue); }

    .item-body { flex: 1; min-width: 0; }
    .item-row {
      display: flex; align-items: baseline; gap: 6px;
      overflow: hidden;
    }
    .item-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; min-width: 0; }
    .item-isbn  { font-family: monospace; font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    .item-delete {
      flex-shrink: 0;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      color: var(--text-muted); border-radius: 6px;
      transition: color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .item-delete:hover { color: var(--red); background: rgba(239,68,68,.10); }
    .item-delete:disabled { opacity: .35; pointer-events: none; }

    .item-icon.sending svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Unsupported state ── */
    .unsupported-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px;
      text-align: center; margin: 8px 0;
    }
    .unsupported-box h2 { font-size: 16px; margin-bottom: 8px; }
    .unsupported-box p  { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .unsupported-box code {
      display: inline-block; background: rgba(255,255,255,.06);
      padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">📚</div>
    <div>
      <h1>TomeKeep 扫码</h1>
      <div class="header-sub">将书背面条形码对准摄像头</div>
    </div>
    <div id="badge" class="badge idle" style="margin-left:auto">
      <span class="badge-dot"></span>
      <span id="badge-label">准备中</span>
    </div>
  </div>

  <!-- Camera -->
  <div class="camera-wrap" id="camera-wrap">
    <video id="video" muted playsinline autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="viewfinder">
      <div class="vf-corner tl"></div>
      <div class="vf-corner tr"></div>
      <div class="vf-corner bl"></div>
      <div class="vf-corner br"></div>
    </div>
    <div class="cam-overlay" id="cam-overlay">
      <!-- SVG camera icon -->
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"/>
      </svg>
      <p id="overlay-msg">正在启动摄像头…</p>
    </div>
  </div>

  <div class="status-msg" id="status-msg"></div>

  <!-- Unsupported browser message (hidden by default) -->
  <div class="unsupported-box" id="unsupported-box" style="display:none">
    <h2>不支持条码识别</h2>
    <p>
      当前浏览器无法加载条码识别引擎。<br><br>
      请使用 <strong>Safari</strong> 或 <strong>Chrome</strong> 打开此页面，并确保网络连接正常。
    </p>
  </div>

  <!-- Scanned list -->
  <div id="list-section" style="display:none">
    <div class="list-header">
      <span>已扫描</span>
      <span class="list-count" id="list-count">0 本</span>
    </div>
    <ul class="scan-list" id="scan-list"></ul>
  </div>
</div>

<script>
(function () {
  'use strict'

  // ── Parse token from URL ──────────────────────────────────────────────────
  const params = new URLSearchParams(location.search)
  const token = params.get('token') || ''
  const baseUrl = location.origin  // https://<ip>:<port>

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const video       = document.getElementById('video')
  const canvas      = document.getElementById('canvas')
  const camOverlay  = document.getElementById('cam-overlay')
  const overlayMsg  = document.getElementById('overlay-msg')
  const statusMsg   = document.getElementById('status-msg')
  const badge       = document.getElementById('badge')
  const badgeLabel  = document.getElementById('badge-label')
  const listSection = document.getElementById('list-section')
  const scanList    = document.getElementById('scan-list')
  const listCount   = document.getElementById('list-count')
  const unsupBox    = document.getElementById('unsupported-box')

  // ── State ─────────────────────────────────────────────────────────────────
  let totalScanned = 0
  const scannedMap = new Map()
  let cooldown = false
  let isDetecting = false
  let cancelled = false
  let rafId = null
  let stream = null

  // ── Utilities ─────────────────────────────────────────────────────────────
  function setBadge(state, label) {
    badge.className = 'badge ' + state
    badgeLabel.textContent = label
  }

  function setStatus(msg) {
    statusMsg.textContent = msg
  }

  function showOverlay(msg) {
    camOverlay.classList.remove('hidden')
    overlayMsg.textContent = msg
  }

  function hideOverlay() {
    camOverlay.classList.add('hidden')
  }

  // Short two-tone beep using Web Audio API
  function playBeep() {
    try {
      const ctx = new AudioContext()
      const gain = ctx.createGain()
      gain.gain.setValueAtTime(0.3, ctx.currentTime)
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15)
      gain.connect(ctx.destination)
      const osc = ctx.createOscillator()
      osc.type = 'sine'
      osc.frequency.setValueAtTime(880, ctx.currentTime)
      osc.frequency.linearRampToValueAtTime(1320, ctx.currentTime + 0.07)
      osc.connect(gain)
      osc.start(ctx.currentTime)
      osc.stop(ctx.currentTime + 0.15)
      osc.onended = () => void ctx.close()
    } catch (_) { /* ignore */ }
  }

  // Draw barcode highlight on canvas (shared between both decoder paths)
  // barcodes: array of { cornerPoints?, boundingBox? }
  function drawOverlay(barcodes) {
    const ctx = canvas.getContext('2d')
    if (!ctx) return
    const { clientWidth: w, clientHeight: h } = video
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h
    }
    ctx.clearRect(0, 0, w, h)
    if (!barcodes || !barcodes.length) return
    const sx = video.videoWidth  > 0 ? w / video.videoWidth  : 1
    const sy = video.videoHeight > 0 ? h / video.videoHeight : 1
    for (const b of barcodes) {
      ctx.save()
      if (b.cornerPoints && b.cornerPoints.length >= 4) {
        ctx.beginPath()
        ctx.moveTo(b.cornerPoints[0].x * sx, b.cornerPoints[0].y * sy)
        for (let i = 1; i < b.cornerPoints.length; i++)
          ctx.lineTo(b.cornerPoints[i].x * sx, b.cornerPoints[i].y * sy)
        ctx.closePath()
        ctx.strokeStyle = 'rgba(74,222,128,.9)'; ctx.lineWidth = 2.5; ctx.stroke()
        ctx.fillStyle   = 'rgba(74,222,128,.12)'; ctx.fill()
      } else if (b.boundingBox) {
        const { x, y, width, height } = b.boundingBox
        ctx.strokeStyle = 'rgba(74,222,128,.9)'; ctx.lineWidth = 2.5
        ctx.strokeRect(x*sx, y*sy, width*sx, height*sy)
        ctx.fillStyle = 'rgba(74,222,128,.12)'
        ctx.fillRect(x*sx, y*sy, width*sx, height*sy)
      }
      ctx.restore()
    }
  }

  // ── Scanned list helpers ──────────────────────────────────────────────────
  function addToList(isbn) {
    if (scannedMap.has(isbn)) return
    totalScanned++
    listSection.style.display = ''
    listCount.textContent = totalScanned + ' 本'

    const li = document.createElement('li')
    li.className = 'scan-item'
    li.innerHTML = `
      <div class="item-icon sending" id="icon-${isbn}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
      </div>
      <div class="item-body">
        <div class="item-row" id="row-${isbn}">
          <span class="item-isbn">${isbn}</span>
        </div>
      </div>
    `
    scanList.prepend(li)

    // If no ack arrives within 20s, mark item as failed so it doesn't spin forever
    const ackTimer = setTimeout(() => {
      const entry = scannedMap.get(isbn)
      if (entry && !entry.acked) {
        const iconEl = document.getElementById('icon-' + isbn)
        if (iconEl && iconEl.className.includes('sending')) {
          iconEl.className = 'item-icon no-meta'
          iconEl.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>`
          // Also add the delete button for timeout-failed entries
          if (!entry.li.querySelector('.item-delete')) {
            const btn = document.createElement('button')
            btn.className = 'item-delete'
            btn.title = '删除此条目'
            btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m19 7-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16"/></svg>`
            btn.addEventListener('click', () => {
              btn.disabled = true
              fetch(`${baseUrl}/delete-entry?token=${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isbn }),
              }).catch(() => { btn.disabled = false })
            })
            entry.li.appendChild(btn)
          }
        }
      }
    }, 20000)

    scannedMap.set(isbn, { li, ackTimer, acked: false })
  }

  function updateItem(isbn, hasMetadata, title) {
    const entry = scannedMap.get(isbn)
    if (!entry) return
    // Cancel the pending timeout so it doesn't overwrite this real ack
    clearTimeout(entry.ackTimer)
    entry.acked = true

    const iconEl = document.getElementById('icon-' + isbn)
    const rowEl  = document.getElementById('row-' + isbn)

    // Rebuild row: "Title  ISBN" or just "ISBN"
    if (rowEl) {
      if (title) {
        rowEl.innerHTML =
          `<span class="item-title">${title}</span><span class="item-isbn">${isbn}</span>`
      }
      // No title: leave the ISBN span as-is
    }

    if (hasMetadata) {
      iconEl.className = 'item-icon ok'
      iconEl.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
    } else {
      iconEl.className = 'item-icon no-meta'
      iconEl.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>`

      // Add delete button — only for failed entries, only once
      if (!entry.li.querySelector('.item-delete')) {
        const btn = document.createElement('button')
        btn.className = 'item-delete'
        btn.title = '删除此条目'
        btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m19 7-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16"/></svg>`
        btn.addEventListener('click', () => {
          btn.disabled = true
          fetch(`${baseUrl}/delete-entry?token=${token}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isbn }),
          }).catch(() => {
            // If the request fails, re-enable the button so the user can retry
            btn.disabled = false
          })
        })
        entry.li.appendChild(btn)
      }
    }
  }

  function removeItem(isbn) {
    const entry = scannedMap.get(isbn)
    if (!entry) return
    clearTimeout(entry.ackTimer)
    entry.li.remove()
    scannedMap.delete(isbn)
    totalScanned--
    listCount.textContent = totalScanned + ' 本'
    if (totalScanned === 0) listSection.style.display = 'none'
  }

  // ── SSE: listen for ack from server ───────────────────────────────────────
  function connectSse() {
    if (!token) return
    const es = new EventSource(`${baseUrl}/events?token=${token}`)
    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data)
        if (data.type === 'ack' && data.isbn) {
          updateItem(data.isbn, !!data.hasMetadata, data.title)
        } else if (data.type === 'delete-ack' && data.isbn) {
          removeItem(data.isbn)
        }
      } catch (_) { /* ignore */ }
    }
    // EventSource auto-reconnects on error
  }

  // ── Send ISBN to Electron ─────────────────────────────────────────────────
  async function sendIsbn(isbn) {
    try {
      await fetch(`${baseUrl}/scan?token=${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isbn }),
      })
    } catch (err) {
      console.warn('send failed', err)
    }
  }

  // ── Validate that rawValue looks like an EAN-13 or UPC-A barcode ─────────
  // Rejects QR codes, URLs, and any other non-numeric / wrong-length values.
  // UPC-A (12 digits) is zero-padded to 13 by prepending '0'.
  function normalizeBarcode(rawValue) {
    if (!rawValue || typeof rawValue !== 'string') return null
    const digits = rawValue.trim()
    if (/^\d{13}$/.test(digits)) return digits          // EAN-13 as-is
    if (/^\d{12}$/.test(digits)) return '0' + digits   // UPC-A → EAN-13
    return null
  }

  // ── Shared: handle a decoded barcode value ───────────────────────────────
  function onDetected(rawValue) {
    if (cooldown || !rawValue) return
    const isbn = normalizeBarcode(rawValue)
    if (!isbn) return   // skip QR codes, URLs, short/long codes, etc.
    cooldown = true
    playBeep()
    if (!scannedMap.has(isbn)) {
      addToList(isbn)
      void sendIsbn(isbn)
    }
    setTimeout(() => { cooldown = false }, 1200)
  }

  // ══════════════════════════════════════════════════════════════════════════
  // PATH A: Native BarcodeDetector (Chrome Android, future Safari)
  // ══════════════════════════════════════════════════════════════════════════
  async function tick(detector) {
    if (cancelled) return
    if (!isDetecting) {
      isDetecting = true
      try {
        const barcodes = await detector.detect(video)
        drawOverlay(barcodes)
        if (barcodes.length && barcodes[0].rawValue) {
          onDetected(barcodes[0].rawValue)
          drawOverlay([barcodes[0]])
        }
      } catch (e) {
        console.warn('detect error', e)
      } finally {
        isDetecting = false
      }
    }
    if (!cancelled) rafId = requestAnimationFrame(() => void tick(detector))
  }

  async function startNative() {
    const detector = new window.BarcodeDetector({ formats: ['ean_13', 'upc_a'] })
    connectSse()
    void tick(detector)
  }

  // ══════════════════════════════════════════════════════════════════════════
  // PATH B: @zxing/library software fallback (iOS Safari, Firefox, etc.)
  // Loaded on demand from CDN only when BarcodeDetector is unavailable.
  // ══════════════════════════════════════════════════════════════════════════
  const ZXING_CDN = '/vendor/zxing-library.min.js'

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script')
      s.src = src
      const timer = setTimeout(() => reject(new Error('Timeout (10s) loading: ' + src)), 10000)
      s.onload = () => { clearTimeout(timer); resolve() }
      s.onerror = (e) => { clearTimeout(timer); reject(new Error('Failed to load: ' + src + ' (' + e.type + ')')) }
      document.head.appendChild(s)
    })
  }

  // Decode one frame from the video element via canvas snapshot.
  // Uses HTMLCanvasElementLuminanceSource (the correct API in @zxing/library).
  // The offscreen canvas is drawn at half the camera resolution (capped at 640×360)
  // to reduce ZXing's per-frame CPU work by ~75% with negligible impact on EAN-13
  // recognition, since 1-D barcodes only need horizontal resolution.
  function decodeFrame(zxingReader, offscreenCanvas, offscreenCtx) {
    if (video.readyState < video.HAVE_CURRENT_DATA) return null
    const vw = video.videoWidth
    const vh = video.videoHeight
    if (!vw || !vh) return null
    // Decode at half resolution, capped at 640 wide
    const scale = Math.min(0.5, 640 / vw)
    const dw = Math.round(vw * scale)
    const dh = Math.round(vh * scale)
    if (offscreenCanvas.width !== dw || offscreenCanvas.height !== dh) {
      offscreenCanvas.width = dw
      offscreenCanvas.height = dh
    }
    offscreenCtx.drawImage(video, 0, 0, dw, dh)
    try {
      const luminanceSource = new window.ZXing.HTMLCanvasElementLuminanceSource(offscreenCanvas)
      const binaryBitmap = new window.ZXing.BinaryBitmap(new window.ZXing.HybridBinarizer(luminanceSource))
      const result = zxingReader.decode(binaryBitmap)
      return result ? result.getText() : null
    } catch (_) {
      // NotFoundException is thrown every frame when no barcode is in view — expected
      return null
    }
  }

  async function startZxing() {
    setStatus('正在加载条码引擎…')
    let loadErr = null
    try {
      await loadScript(ZXING_CDN)
    } catch (e) {
      loadErr = e
    }

    if (loadErr || !window.ZXing) {
      const reason = loadErr ? loadErr.message : 'ZXing 未定义'
      unsupBox.style.display = ''
      document.getElementById('camera-wrap').style.display = 'none'
      setBadge('error', '加载失败')
      setStatus('')
      // Show the actual error on screen so it's visible without devtools
      unsupBox.querySelector('p').innerHTML =
        '条码引擎加载失败。<br><br>' +
        '<strong>原因：</strong><code style="word-break:break-all;font-size:11px">' +
        reason.replace(/</g, '&lt;') + '</code><br><br>' +
        '请重启应用后刷新此页面。'
      return
    }

    // Use MultiFormatReader to support EAN-13 and UPC-A
    // setHints takes a native JS Map (ZXing has no Map export)
    let zxingReader
    try {
      const hints = new Map()
      hints.set(window.ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        window.ZXing.BarcodeFormat.EAN_13,
        window.ZXing.BarcodeFormat.UPC_A,
      ])
      zxingReader = new window.ZXing.MultiFormatReader()
      zxingReader.setHints(hints)
    } catch (e) {
      unsupBox.style.display = ''
      document.getElementById('camera-wrap').style.display = 'none'
      setBadge('error', '初始化失败')
      setStatus('')
      unsupBox.querySelector('p').innerHTML =
        '条码引擎初始化失败。<br><br>' +
        '<strong>原因：</strong><code style="word-break:break-all;font-size:11px">' +
        String(e).replace(/</g, '&lt;') + '</code>'
      return
    }

    const offscreenCanvas = document.createElement('canvas')
    const offscreenCtx = offscreenCanvas.getContext('2d')

    connectSse()
    setStatus('将条形码对准摄像头，识别后自动入库')

    function zxingTick() {
      if (cancelled) return
      if (!isDetecting) {
        isDetecting = true
        try {
          const raw = decodeFrame(zxingReader, offscreenCanvas, offscreenCtx)
          if (raw) {
            // Draw a simple bounding box at center as visual feedback
            const { clientWidth: w, clientHeight: h } = video
            drawOverlay([{ boundingBox: { x: w * 0.1, y: h * 0.3, width: w * 0.8, height: h * 0.4 } }])
            onDetected(raw)
            // onDetected sets a 1200ms cooldown — no extra delay needed here;
            // just clear the overlay and immediately queue the next frame.
            drawOverlay([])
          }
        } catch (_) {
          drawOverlay([])
        } finally {
          isDetecting = false
        }
      }
      if (!cancelled) rafId = requestAnimationFrame(zxingTick)
    }

    rafId = requestAnimationFrame(zxingTick)
  }

  // ══════════════════════════════════════════════════════════════════════════
  // Camera startup (shared)
  // ══════════════════════════════════════════════════════════════════════════
  async function startCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showOverlay('当前环境不支持摄像头访问。')
      setBadge('error', '不支持')
      return false
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      })
      if (cancelled) { stream.getTracks().forEach(t => t.stop()); return false }
      video.srcObject = stream
      await video.play()
      hideOverlay()
      setBadge('scanning', '扫描中')
      return true
    } catch (e) {
      const name = e instanceof DOMException ? e.name : ''
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        showOverlay('摄像头权限被拒绝，请允许后刷新页面。')
        setBadge('error', '无权限')
      } else {
        showOverlay('摄像头启动失败：' + (e.message || '未知错误'))
        setBadge('error', '错误')
      }
      return false
    }
  }

  async function init() {
    setBadge('idle', '启动中')
    showOverlay('正在启动摄像头…')
    setStatus('')

    const cameraOk = await startCamera()
    if (!cameraOk) return

    if (window.BarcodeDetector) {
      // Native path: Chrome Android, etc.
      setStatus('将条形码对准摄像头，识别后自动入库')
      void startNative()
    } else {
      // Software fallback: iOS Safari, Firefox, etc.
      void startZxing()
    }
  }

  // ── Cleanup on page hide (phone switches apps) ────────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      cancelled = true
      if (rafId != null) { cancelAnimationFrame(rafId); rafId = null }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null }
    } else {
      cancelled = false
      cooldown = false
      isDetecting = false
      void init()
    }
  })

  void init()
})()
</script>
</body>
</html>
