name: Release Mac Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm pkg set version="$VERSION" --prefix packages/desktop

      - name: Build Mac app (unsigned)
        run: pnpm --filter @tomekeep/desktop electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
